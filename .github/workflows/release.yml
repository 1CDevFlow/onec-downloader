name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: onec-download-rs

jobs:
  checks:
    name: rust-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

  create-release:
    name: create-draft-release
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --draft=true \
              --title "${BIN_NAME} ${GITHUB_REF_NAME}" \
              --notes "Черновик релиза с portable-бинарниками ${BIN_NAME}."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --title "${BIN_NAME} ${GITHUB_REF_NAME}" \
              --notes "Черновик релиза с portable-бинарниками ${BIN_NAME}."
          fi

  build:
    name: ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare portable binary
        id: portable
        shell: bash
        run: |
          mkdir -p dist

          source_path="target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.ext }}"
          asset_name="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.name }}${{ matrix.ext }}"
          asset_path="dist/${asset_name}"

          if [ ! -f "${source_path}" ]; then
            echo "Portable binary not found: ${source_path}" >&2
            exit 1
          fi

          cp "${source_path}" "${asset_path}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "${asset_path}"
          fi

          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload portable binary to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.portable.outputs.asset_path }}" --clobber
